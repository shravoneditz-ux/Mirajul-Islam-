<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Ultra - Black Glass Edition</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00d2ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0f0c29; 
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            color: white; 
            height: 100vh; 
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- Glassmorphism UI --- */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .screen { display: none; width: 100%; max-width: 450px; height: 100%; position: relative; padding: 20px; text-align: center;}
        .screen.active { display: flex; flex-direction: column; align-items: center;}

        /* --- Header --- */
        .app-header { 
            width: 100%; max-width: 450px; display: flex; justify-content: space-between; 
            align-items: center; padding: 15px; margin-top: 10px;
        }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); background: #333; }
        .stats { display: flex; gap: 10px; }
        .stat-item { background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; border: 1px solid var(--glass-border); }

        /* --- Main Menu --- */
        .logo-area { margin-top: 50px; margin-bottom: 40px; }
        .logo-text { font-size: 40px; font-weight: 900; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        
        .menu-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-card { 
            padding: 25px 10px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .menu-card:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-5px); }
        .menu-card img { width: 45px; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--accent)); }
        .menu-card span { font-weight: bold; text-transform: uppercase; font-size: 14px; }

        /* --- Board Design --- */
        .board-container { 
            margin-top: 20px; padding: 5px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; border: 1px solid var(--glass-border);
        }
        .ludo-board {
            width: 340px; height: 340px; background: rgba(255,255,255,0.9);
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            border-radius: 5px; overflow: hidden;
        }
        .cell { border: 0.1px solid #ccc; }
        
        /* Home Bases */
        .home { border: 15px solid white; }
        .r-home { grid-area: 1/1/7/7; background: #ff4757; }
        .g-home { grid-area: 1/10/7/16; background: #2ed573; }
        .b-home { grid-area: 10/1/16/7; background: #1e90ff; }
        .y-home { grid-area: 10/10/16/16; background: #ffa502; }
        .center { grid-area: 7/7/10/10; background: #2f3542; }

        /* --- Controls --- */
        .dice-box { 
            margin-top: 30px; width: 70px; height: 70px; 
            background: white; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; 
            font-size: 35px; color: #333; font-weight: bold;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .roll-btn { 
            margin-top: 15px; background: var(--accent); color: #000; 
            border: none; padding: 12px 40px; border-radius: 30px;
            font-weight: 900; font-size: 18px; cursor: pointer;
            box-shadow: 0 0 15px var(--accent);
        }

    </style>
</head>
<body>

    <div class="app-header">
        <div class="user-profile">
            <div class="avatar"></div>
            <div style="text-align: left;">
                <div style="font-size: 14px; font-weight: bold;">SHRAVON</div>
                <div style="font-size: 11px; color: var(--accent);">Level 15</div>
            </div>
        </div>
        <div class="stats">
            <div class="stat-item">💎 150</div>
            <div class="stat-item">🪙 3,135</div>
        </div>
    </div>

    <div id="screen-main" class="screen active">
        <div class="logo-area">
            <div class="logo-text">LUDO ULTRA</div>
            <div style="font-size: 12px; letter-spacing: 5px; color: #888;">GLASS EDITION</div>
        </div>

        <div class="menu-grid">
            <div class="menu-card glass-panel" onclick="openScreen('game')">
                <img src="https://cdn-icons-png.flaticon.com/128/330/330425.png">
                <span>Online</span>
            </div>
            <div class="menu-card glass-panel" onclick="openScreen('game')">
                <img src="https://cdn-icons-png.flaticon.com/128/2502/2502844.png">
                <span>Pass N Play</span>
            </div>
            <div class="menu-card glass-panel">
                <img src="https://cdn-icons-png.flaticon.com/128/2907/2907150.png">
                <span>Computer</span>
            </div>
            <div class="menu-card glass-panel">
                <img src="https://cdn-icons-png.flaticon.com/128/3135/3135715.png">
                <span>Themes</span>
            </div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px;">
            <button onclick="openScreen('main')" style="background:none; border:none; color:white; font-weight:bold;">← EXIT</button>
            <span style="color: var(--accent); font-weight: bold;">MATCH LIVE</span>
        </div>

        <div class="board-container glass-panel">
            <div class="ludo-board">
                <div class="home r-home"></div>
                <div class="home g-home"></div>
                <div class="home b-home"></div>
                <div class="home y-home"></div>
                <div class="center"></div>
                </div>
        </div>

        <div class="dice-box" id="dice-val">?</div>
        <button class="roll-btn" id="roll-btn">ROLL DICE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBnTUn2QtEvIpB_pu9q_0Pq_Spx0OwkO8c",
            authDomain: "ludo-app-97329.firebaseapp.com",
            projectId: "ludo-app-97329",
            storageBucket: "ludo-app-97329.firebasestorage.app",
            messagingSenderId: "629961689451",
            appId: "1:629961689451:web:38fbd79ad0f7d94896a42e",
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const gameRef = ref(database, 'ludo_ultra/live');

        // Screen Logic
        window.openScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        };

        // Populate Board Cells
        const board = document.querySelector('.ludo-board');
        for(let i=0; i<225; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            board.appendChild(cell);
        }

        // Dice Roll Logic
        const diceBtn = document.getElementById('roll-btn');
        const diceVal = document.getElementById('dice-val');

        diceBtn.onclick = () => {
            const res = Math.floor(Math.random() * 6) + 1;
            // Online Sync
            set(gameRef, { roll: res, time: Date.now() });
            
            // Animation
            diceVal.style.transform = "scale(1.2) rotate(10deg)";
            setTimeout(() => {
                diceVal.style.transform = "scale(1) rotate(0deg)";
                diceVal.innerText = res;
            }, 100);
        };

        // Listen for online moves
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if(data) {
                diceVal.innerText = data.roll;
            }
        });

    </script>
</body>
  </html>
