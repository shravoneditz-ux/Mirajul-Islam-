<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirajul Islam Shravon | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --wp-green: #25D366;
            --danger: #ff2d55;
            --glass: rgba(255, 255, 255, 0.05);
            --bg-dark: #020205;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(37, 211, 102, 0.05) 0%, transparent 50%);
            font-family: 'Quicksand', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            width: 100%;
            max-width: 460px;
            padding: 50px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
        }

        .avatar-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            border-radius: 40px;
            padding: 3px;
            background: linear-gradient(135deg, var(--neon-blue), #ffffff10);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 38px;
            object-fit: cover;
        }

        .name {
            font-family: 'Syncopate', sans-serif;
            font-size: 17px;
            letter-spacing: 3px;
            margin-bottom: 40px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        .info-list {
            text-align: left;
            margin-bottom: 30px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            /* High Gap for Premium Feel */
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .row:last-child {
            border: none;
        }

        .label {
            color: var(--neon-blue);
            font-weight: 700;
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .value {
            color: #e0e6ed;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .rel-value {
            color: var(--danger);
            font-weight: 800;
            text-shadow: 0 0 10px rgba(255, 45, 85, 0.3);
        }

        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
            text-decoration: none;
            background: var(--wp-green);
            color: #ffffff;
            padding: 18px;
            border-radius: 20px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .whatsapp-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.5);
            filter: brightness(1.1);
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="avatar-container">
            <img src="https://i.postimg.cc/4dWFZrhD/Picsart-26-01-27-17-13-20-396.png" alt="SHRAVON">
        </div>

        <h1 class="name">Mirajul Islam Shravon</h1>

        <div class="info-list">
            <div class="row">
                <span class="label">Age</span>
                <span class="value">18+</span>
            </div>
            <div class="row">
                <span class="label">Birthday</span>
                <span class="value">30/07/2007</span>
            </div>
            <div class="row">
                <span class="label">Study</span>
                <span class="value">SSC Batch 2025</span>
            </div>
            <div class="row">
                <span class="label">Religion</span>
                <span class="value">Islam</span>
            </div>
            <div class="row">
                <span class="label">Relationship</span>
                <span class="value rel-value">SINGLE</span>
            </div>
            <div class="row">
                <span class="label">Blood Group</span>
                <span class="value">AB+</span>
            </div>
            <div class="row">
                <span class="label">Height</span>
                <span class="value">5.4'</span>
            </div>
            <div class="row">
                <span class="label">Hobby</span>
                <span class="value">Writing & Reading</span>
            </div>
            <div class="row">
                <span class="label">Address</span>
                <span class="value">Dhaka, Bangladesh</span>
            </div>
            <div class="row">
                <span class="label">Skill 01</span>
                <span class="value">Cyber Specialist</span>
            </div>
            <div class="row">
                <span class="label">Skill 02</span>
                <span class="value">App Developer</span>
            </div>
            <div class="row">
                <span class="label">Skill 03</span>
                <span class="value">Novel Writer</span>
            </div>
        </div>

        <a href="https://wa.me/8801883536835" class="whatsapp-btn">WhatsApp</a>
    </div>

</body>

</html>
